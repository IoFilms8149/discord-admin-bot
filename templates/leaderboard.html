<!DOCTYPE HTML>
<html>
<head>
    <title>Bot Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h1>Server Leaderboard</h1>
    <nav class="navbar">
        <div class="nav-logo">Bot Control</div>
        <ul class="links">
            <li><a href="/">Dashboard</a></li>
            <li><a href="/logs">Moderation Logs</a></li>
            <li><a href="/leaderboard">Leaderboard</a></li>
        </ul>
    </nav>
    <table>
        <thead>
            <tr>
                <td>Rank</td>
                <td>User</td>
                <td>Level</td>
                <td>XP</td>
            </tr>
        </thead>
        <tbody>
            {% for user in users %}
            <tr>
                <td>#{{ loop.index }}</td>
                <td>{{ user["username"] if user["username"] else user["user_id"] }}</td>
                <td>{{ user["level"] }}</td>
                <td>{{ user["xp"] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
